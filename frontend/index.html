<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO Meta Tags -->
    <title>HubZone Esports & Gaming Community | Tournaments, Forums & More</title>
    <meta name="title" content="HubZone — #1 Esports & Gaming Community | Tournaments, Forums & More" />
    <meta name="description" content="HubZone is the ultimate gaming community platform. Join esports tournaments, connect with gamers worldwide, climb leaderboards, and share your gaming moments. Free to join!" />
    <meta name="keywords" content="gaming, esports, tournaments, gaming community, online gaming, competitive gaming, gaming forum, PUBG, Free Fire, Valorant, CSGO, gaming leaderboard, multiplayer gaming, gaming platform" />
    <meta name="author" content="HubZone" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <link rel="canonical" href="https://hubzone.gg" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://hubzone.gg" />
    <meta property="og:title" content="HubZone — #1 Esports & Gaming Community" />
    <meta property="og:description" content="Join esports tournaments, connect with gamers worldwide, climb leaderboards, and share your gaming moments. Free to join!" />
    <meta property="og:image" content="https://hubzone.gg/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="HubZone" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://hubzone.gg" />
    <meta property="twitter:title" content="HubZone — #1 Esports & Gaming Community" />
    <meta property="twitter:description" content="Join esports tournaments, connect with gamers worldwide, climb leaderboards, and share your gaming moments." />
    <meta property="twitter:image" content="https://hubzone.gg/og-image.png" />

    <!-- Additional SEO -->
    <meta name="theme-color" content="#06b6d4" />
    <meta name="apple-mobile-web-app-title" content="HubZone" />
    <meta name="application-name" content="HubZone" />
    <meta name="msapplication-TileColor" content="#06b6d4" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "HubZone",
      "alternateName": "HubZone Gaming",
      "url": "https://hubzone.gg",
      "description": "The ultimate esports and gaming community platform. Join tournaments, forums, and connect with gamers worldwide.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://hubzone.gg/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "HubZone",
        "logo": {
          "@type": "ImageObject",
          "url": "https://hubzone.gg/logo.png"
        }
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
